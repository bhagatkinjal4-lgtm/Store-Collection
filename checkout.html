<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Vastranand</title>
  <link rel="stylesheet" href="styles.css">

  <style>
    .checkout-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
    }

    .box {
      background: #fff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    

    @media (max-width:768px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<section class="container">
  <h2 class="section-title">Checkout</h2>

  <div id="checkoutArea" class="checkout-grid">

    <!-- LEFT: ADDRESS -->
    <div class="box">
      <h3>Delivery Details</h3>

      <input type="text" placeholder="Full Name" required>
      <input type="tel" placeholder="Mobile Number" required>
      <input type="text" placeholder="Address">
      <input type="text" placeholder="City">
      <input type="text" placeholder="Pincode">

      <h3>Payment Method</h3>
      <select>
        <option>Cash on Delivery</option>
        <option disabled>UPI (Coming Soon)</option>
        <option disabled>Card (Coming Soon)</option>
      </select>
    </div>

    <!-- RIGHT: SUMMARY -->
    <div class="box">
      <h3>Order Summary</h3>

      <div class="summary-row">
        <span>Items Total</span>
        <span>₹<span id="subtotal">0</span></span>
      </div>

      <div class="summary-row">
        <span>Discount</span>
        <span>- ₹<span id="discount">0</span></span>
      </div>

      <div class="summary-row">
        <strong>Total Payable</strong>
        <strong>₹<span id="total">0</span></strong>
      </div>

      <br>

      <input type="text" id="coupon" placeholder="Coupon Code">
      <button class="cta-btn" onclick="applyCoupon()">Apply Coupon</button>

      <br><br>

      <button class="cta-btn" onclick="placeOrder()">Place Order</button>
    </div>

  </div>

 
</section>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let discountValue = 0;

  function calculateTotal() {
    let subtotal = cart.reduce((sum, item) => sum + item.price, 0);
    document.getElementById("subtotal").innerText = subtotal;
    document.getElementById("discount").innerText = discountValue;
    document.getElementById("total").innerText = subtotal - discountValue;
  }

  function applyCoupon() {
    const code = document.getElementById("coupon").value.trim();

    if (code === "VAS200") {
      discountValue = 200;
      alert("₹200 OFF applied!");
    } else {
      discountValue = 0;
      alert("Invalid coupon");
    }
    calculateTotal();
  }

  function placeOrder() {
    if (cart.length === 0) {
      alert("Your cart is empty");
      return;
    }

    // SAVE ORDER DATA (for confirmation + my orders)
   const orderData = {
  id: "VN" + Math.floor(Math.random() * 100000),
  payment: "Cash on Delivery",
  total: document.getElementById("total").innerText,
  items: cart,
  date: new Date().toLocaleDateString(),
  status: "Placed"   // ✅ NEW
};



    localStorage.setItem("lastOrder", JSON.stringify(orderData));

let orders = JSON.parse(localStorage.getItem("orders")) || [];
orders.push(orderData);
localStorage.setItem("orders", JSON.stringify(orders));


    // CLEAR CART
    localStorage.removeItem("cart");

    // REDIRECT TO CONFIRMATION PAGE ✅
    window.location.href = "order-confirmation.html";
  }

  calculateTotal();
</script>

</body>
</html>
