<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Cart | Vastranand</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .cart-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding: 15px 0;
    }
    .cart-item:last-child {
      border-bottom: none;
    }
    .remove-btn {
      background: #B71C1C;
      color: #fff;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
      border-radius: 5px;
    }
    .summary {
      text-align: right;
      font-size: 18px;
    }
  </style>
</head>
<body>

<section class="container">
  <h2 class="section-title">My Shopping Cart</h2>

  <div id="cartItems" class="cart-box"></div>

  <div class="cart-box summary">
    <p>Total Items: <span id="itemCount">0</span></p>
    <p><b>Total Price: ₹<span id="totalPrice">0</span></b></p>
    <br>
    <a href="checkout.html"  class="cta-btn">Proceed to Checkout</a>
  </div>
</section>

<script>
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const cartItems = document.getElementById("cartItems");
  const itemCount = document.getElementById("itemCount");
  const totalPrice = document.getElementById("totalPrice");

  function renderCart() {
    cartItems.innerHTML = "";
    let total = 0;

    if (cart.length === 0) {
      cartItems.innerHTML = "<p>Your cart is empty 🛍️</p>";
    }

    cart.forEach((item, index) => {
      total += item.price;

      cartItems.innerHTML += `
        <div class="cart-item">
          <div>
            <h4>${item.name}</h4>
            <p>₹${item.price}</p>
          </div>
          <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
        </div>
      `;
    });

    itemCount.innerText = cart.length;
    totalPrice.innerText = total;
  }

  function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }

  renderCart();
</script>
<script src="script.js"></script>
</body>
</html>
