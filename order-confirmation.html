<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Confirmed | Vastranand</title>
  <link rel="stylesheet" href="order-confirmation.css">
</head>
<body>

<div class="confirm-wrapper">
  <div class="confirm-card">

    <div class="success-icon">✔</div>

    <h1>Thank You for Your Order!</h1>
    <p class="subtitle">
      Your order has been placed successfully.
    </p>

    <div class="order-details">
      <p><strong>Order ID:</strong> <span id="orderId"></span></p>
      <p><strong>Payment Method:</strong> <span id="paymentMode"></span></p>
      <p><strong>Estimated Delivery:</strong> <span id="deliveryDate"></span></p>
    </div>

    <div class="actions">
      <a href="orders.html" class="btn-outline">View My Orders</a>
      <a href="index.html" class="btn-primary">Continue Shopping</a>
    </div>

  </div>
</div>

<script src="order-confirmation.js"></script>
</body>
</html>
